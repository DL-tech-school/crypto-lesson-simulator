<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crypto Quest — симулятор портфеля</title>

<style>
:root{
--bg:#0f1226;--panel:rgba(255,255,255,0.08);--text:#f5f7ff;
--muted:#b9c0e0;--accent:#7c5cff;--green:#2ecc71;
--red:#ff5d73;--yellow:#ffd166;--blue:#4cc9f0;--pink:#ff77c8;
--shadow:0 16px 40px rgba(0,0,0,0.25);--radius:22px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Inter;background:linear-gradient(180deg,#11152d,#0b0e20);color:var(--text);}
.wrap{max-width:1180px;margin:auto;padding:24px;}

.panel{background:var(--panel);border-radius:var(--radius);padding:20px;}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px;}

.coin-card{padding:20px;}
.coin-name{font-size:20px;font-weight:800;}
.label{font-size:13px;color:var(--muted);}
.value{font-weight:700;}
input,select{width:100%;padding:10px;border-radius:10px;border:none;background:#222;color:white;}

button{padding:12px;border:none;border-radius:12px;font-weight:700;cursor:pointer;}
.primary{background:#7c5cff;color:white;}
.secondary{background:#333;color:white;}

.result-line{display:flex;justify-content:space-between;padding:8px 0;}

</style>
</head>

<body>
<div class="wrap">

<h1>Crypto Quest</h1>
<p>Розподіли $1000 між монетами та дивись результат</p>

<div class="grid">

<div class="panel coin-card">
<div class="coin-name">🟡 NovaBit</div>
<input id="safeInput" type="number" placeholder="Сума">
<div class="value" id="safeCurrent">$0</div>
</div>

<div class="panel coin-card">
<div class="coin-name">🔵 PulseX</div>
<input id="trendInput" type="number" placeholder="Сума">
<div class="value" id="trendCurrent">$0</div>
</div>

<div class="panel coin-card">
<div class="coin-name">🔴 VoltEdge</div>
<input id="riskyInput" type="number" placeholder="Сума">
<div class="value" id="riskyCurrent">$0</div>
</div>

</div>

<div class="panel">

<h3>📈 Подія ринку</h3>

<label>NovaBit, %</label>
<input id="safePercent" type="number">

<label>PulseX, %</label>
<input id="trendPercent" type="number">

<label>VoltEdge, %</label>
<input id="riskyPercent" type="number">

<button class="primary" onclick="apply()">Застосувати</button>

</div>

<div class="panel">

<h3>📊 Результат</h3>

<div class="result-line"><span>NovaBit</span><span id="sumSafe">$0</span></div>
<div class="result-line"><span>PulseX</span><span id="sumTrend">$0</span></div>
<div class="result-line"><span>VoltEdge</span><span id="sumRisky">$0</span></div>

<div class="result-line"><b>Разом</b><b id="total">$0</b></div>

</div>

</div>

<script>

let safe=0,trend=0,risky=0;

function apply(){

safe+=safe*(document.getElementById("safePercent").value||0)/100;
trend+=trend*(document.getElementById("trendPercent").value||0)/100;
risky+=risky*(document.getElementById("riskyPercent").value||0)/100;

update();
}

document.getElementById("safeInput").oninput=e=>{
safe=+e.target.value||0;update();
}
document.getElementById("trendInput").oninput=e=>{
trend=+e.target.value||0;update();
}
document.getElementById("riskyInput").oninput=e=>{
risky=+e.target.value||0;update();
}

function update(){

document.getElementById("safeCurrent").innerText="$"+safe.toFixed(2);
document.getElementById("trendCurrent").innerText="$"+trend.toFixed(2);
document.getElementById("riskyCurrent").innerText="$"+risky.toFixed(2);

document.getElementById("sumSafe").innerText="$"+safe.toFixed(2);
document.getElementById("sumTrend").innerText="$"+trend.toFixed(2);
document.getElementById("sumRisky").innerText="$"+risky.toFixed(2);

document.getElementById("total").innerText="$"+(safe+trend+risky).toFixed(2);

}

</script>

</body>
</html>
